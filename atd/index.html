<!DOCTYPE html>
<html>
<head>
    <title>ATD Proxy</title>
</head>
<body>
    <script>
        // మీ గూగుల్ వెబ్ యాప్ కొత్త URL లింక్ ఇక్కడ సెట్ చేయబడింది
        const googleUrl = "https://script.google.com/macros/s/AKfycbxqyrIDhnqR-DqNsR-mJ_RUAEvDypeaIZsslz0V2hnLHVMIJ2-qKQM3P8rpEoeUSxzKpQ/exec";

        async function forwardData() {
            const urlParams = new URLSearchParams(window.location.search);
            const queryString = urlParams.toString();
            
            // మిషన్ నెట్‌వర్క్ కనెక్షన్ చెక్ చేసుకునేటప్పుడు (Init)
            if (queryString.includes('type=init')) {
                document.body.innerText = "Server=OK\n";
                return;
            }

            try {
                // గూగుల్ షీట్‌కు డేటాను ఫార్వార్డ్ చేయడం
                await fetch(`${googleUrl}?${queryString}`, {
                    method: 'GET',
                    mode: 'no-cors'
                });
                document.body.innerText = "OK\n";
            } catch (error) {
                document.body.innerText = "Error\n";
            }
        }

        forwardData();
    </script>
</body>
</html>
